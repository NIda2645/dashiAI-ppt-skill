name: 🐛 问题反馈 / Bug Report
description: 生成、编辑、预览或导出过程中遇到的错误
labels: [bug]
body:
  - type: dropdown
    id: stage
    attributes:
      label: 问题发生在哪个环节?
      options:
        - 安装 / 更新 skill
        - 生成 PPT(渲染失败或内容不对)
        - 浏览器内编辑 / 预览
        - 导出 PDF
        - 导出 PPTX
        - 其他
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 使用环境
      description: 操作系统 + 使用的 Agent(如 macOS + Claude Code / Windows + Codex / 豆包 等)
      placeholder: "例如: Windows 11 + Codex"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Skill 版本
      description: 安装目录里 SKILL.md 的「当前版本」;不确定可以让 AI 帮你看
      placeholder: "例如: 0.1.36"
  - type: textarea
    id: description
    attributes:
      label: 问题描述与复现步骤
      description: 做了什么 → 期望什么 → 实际发生了什么
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 报错信息 / 截图
      description: 页面弹窗文字、浏览器控制台(F12)的红色报错、或终端输出;截图直接拖进来
  - type: checkboxes
    id: checklist
    attributes:
      label: 导出类问题请先自查
      options:
        - label: 已确认页面是通过 http://127.0.0.1:<端口>/ 打开的(不是双击 HTML 文件)
        - label: 已更新到最新版 skill 并重新生成过一次
